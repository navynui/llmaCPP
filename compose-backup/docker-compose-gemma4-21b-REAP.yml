services:
  llama-server:
    build:
      context: .
      dockerfile: .devops/cuda.Dockerfile
      args:
        CUDA_DOCKER_ARCH: "60"
    container_name: llm-server
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "8080:8080"
    volumes:
      - ../models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # flags สำหรับ Gemma 26B บน VRAM 16GB
          #--mmproj /models/gemma-4-v-projector.gguf  #this will enable vision capability but we need to lower context size to 8k

    command: >
          -m /models/gemma-4-21b-a4b-it-REAP-Q4_K_M.gguf
          --host 0.0.0.0
          --port 8080
          --alias local-model
          --temp 1.0
          --top-p 0.95
          --top-k 64
          --chat-template-kwargs '{"enable_thinking":false}'
          --flash-attn on
          --n-gpu-layers 35
          -b 2048
          --ubatch-size 512
          --slot-save-path /models/slots
          --ctx-size 32768
          --cache-type-k q4_0
          --cache-type-v q4_0
          --repeat-penalty 1.1
          --threads 8
          --no-mmap
          --mlock
